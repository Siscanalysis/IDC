schema_version: 1
dataset: "UCI Concrete Compressive Strength (MO: max strength, min cement)"
section: "8.5"
description: >
  Bi-objective mix-design: maximize the NN-predicted 28-day compressive
  strength while minimizing cement content (embodied-CO2 proxy), subject
  to six input-side affine constraints from standard concrete-engineering
  practice (EN 206 / ASTM C595). The cement objective is a passthrough on
  the `cement` input (no surrogate call). Matches Equation
  (eq:concrete_mo_objectives) and Table (tab:case_concrete_mo_constraints)
  of the paper.
official_benchmark: false   # MO framing is not in the original Yeh 1998 paper.

# Column names match data/concrete_uci/concrete_uci.csv:
#   cement, slag, fly_ash, water, sp, coarse_agg, fine_agg, age, strength
# "binder" below means cement + slag + fly_ash.
inputs:
  - name: cement
    type: continuous
    bounds: auto              # training-data envelope
    units: kg/m^3
  - name: slag
    type: continuous
    bounds: auto
    units: kg/m^3
  - name: fly_ash
    type: continuous
    bounds: auto
    units: kg/m^3
  - name: water
    type: continuous
    bounds: auto
    units: kg/m^3
  - name: sp
    type: continuous
    bounds: auto
    units: kg/m^3
    notes: "Superplasticizer."
  - name: coarse_agg
    type: continuous
    bounds: auto
    units: kg/m^3
  - name: fine_agg
    type: continuous
    bounds: auto
    units: kg/m^3
  - name: age
    type: continuous
    bounds: [1, 365]
    units: days
    fix_at: 28
    notes: "Locked to 28 days for standard strength comparison (paper Eq. eq:concrete_mo_objectives)."

outputs:
  - name: strength
    goal: maximize
    units: MPa
    source: nn_prediction
  - name: cement
    goal: minimize
    units: kg/m^3
    source: passthrough_input
    notes: "Same variable as inputs.cement; minimized as a cost / CO2 proxy. Evaluated directly from the decision vector, no NN call."

# The six input-side affine constraints of Table tab:case_concrete_mo_constraints,
# ordered most-reliable -> least-reliable. "binder" = cement + slag + fly_ash.
# "data pass" = fraction of the 1030 Yeh-1998 rows that individually satisfy
# the constraint (audited 2026-06-02). Reliability combines physical/standards
# grounding with consistency against the measured data.
#
#   The binding constraint is water_cement_upper (excludes 498 rows). The three
#   composition limits (binder/slag/fly-ash) exclude ZERO rows beyond those
#   already removed by the water/cement and mass-balance limits. The full
#   6-constraint feasible set retains 518 of 1030 rows.
formula_constraints:
  # (1) Near-physical identity: concrete density ~ 2400 kg/m^3 by construction.
  - name: mass_balance
    expr: "cement + slag + fly_ash + water + sp + coarse_agg + fine_agg"
    shape: affine
    scope: inputs
    relation: "in"
    value: [2200, 2600]
    required: true
    notes: "Total mix density ~ 2400 kg/m^3. Data pass 99.7%. Most reliable (physical identity)."
  # (2) Standards floor, satisfied by all data.
  - name: binder_floor
    expr: "cement + slag + fly_ash"
    shape: affine
    scope: inputs
    relation: ">="
    value: 200.0
    required: true
    notes: "Minimum binder >= 200 kg/m^3 — BS EN 206 / BS 8500. Data pass 100%."
  # (3) Standards replacement cap, satisfied by all data.
  - name: slag_replacement
    expr: "slag - 0.70 * (cement + slag + fly_ash)"
    shape: affine
    scope: inputs
    relation: "<="
    value: 0.0
    required: true
    notes: "slag <= 0.70 * binder — ASTM C595 Type IS. Data pass 100%."
  # (4) Physical hydration minimum; nearly all data satisfies it.
  - name: water_cement_lower
    expr: "water - 0.30 * cement"
    shape: affine
    scope: inputs
    relation: ">="
    value: 0.0
    required: true
    notes: "water/cement >= 0.30 (minimum water for hydration). Data pass 98.6%."
  # (5) Standards cap; measured fly-ash share reaches 0.55, so this is a design limit.
  - name: fly_ash_replacement
    expr: "fly_ash - 0.40 * (cement + slag + fly_ash)"
    shape: affine
    scope: inputs
    relation: "<="
    value: 0.0
    required: true
    notes: "fly_ash <= 0.40 * binder — ASTM C595 Type IP. Data pass 92.1% (data max 0.55)."
  # (6) Binding design constraint; ~half the (low-strength, high-w/c) rows violate it.
  - name: water_cement_upper
    expr: "water - 0.70 * cement"
    shape: affine
    scope: inputs
    relation: "<="
    value: 0.0
    required: true
    notes: "water/cement <= 0.70 (structural-grade design limit). Data pass 51.7% — the binding constraint (excludes 498 rows). Least reliable as a data-envelope rule."
