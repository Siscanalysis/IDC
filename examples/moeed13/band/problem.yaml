# MOEED-13 — Multi-objective Economic Emission Dispatch (BAND formulation).
#
# Identical to ../problem.yaml except the power-balance constraint is a tight
# tolerance BAND, sum(P_i) in [1799.5, 1800.5] MW, instead of the equality
# sum(P_i) == 1800 MW. The band is the honest matched-budget contest: the
# feasible region has positive measure, so the population baselines (NSGA-II/III)
# can sample it, and IDC's affine repair still projects onto the band. Under the
# equality (../problem.yaml) the feasible set is a measure-zero hyperplane the
# population baselines cannot sample, so they collapse to a single point while
# IDC projects onto it exactly. See Section 7.3.

problem:
  name: moeed13
  type: multi_objective
  source: "Walters & Sheblé (1993) ELD-13 cost + type-based quadratic NOx emission model. Pairing rationale: extends the SO Branch-B problem to MO Branch-B without changing the physics or constraint structure."

dataset:
  type: synthetic
  source: moeed13_cost_and_emission
  n_samples: 100000
  lhs_seed: 7

inputs:
  - { name: P_0,  bounds: [  0.0, 680.0] }
  - { name: P_1,  bounds: [  0.0, 360.0] }
  - { name: P_2,  bounds: [  0.0, 360.0] }
  - { name: P_3,  bounds: [ 60.0, 180.0] }
  - { name: P_4,  bounds: [ 60.0, 180.0] }
  - { name: P_5,  bounds: [ 60.0, 180.0] }
  - { name: P_6,  bounds: [ 60.0, 180.0] }
  - { name: P_7,  bounds: [ 60.0, 180.0] }
  - { name: P_8,  bounds: [ 60.0, 180.0] }
  - { name: P_9,  bounds: [ 40.0, 120.0] }
  - { name: P_10, bounds: [ 40.0, 120.0] }
  - { name: P_11, bounds: [ 55.0, 120.0] }
  - { name: P_12, bounds: [ 55.0, 120.0] }

constraints:
  - name: power_balance
    type: linear_inequality
    coefficients:
      P_0: 1
      P_1: 1
      P_2: 1
      P_3: 1
      P_4: 1
      P_5: 1
      P_6: 1
      P_7: 1
      P_8: 1
      P_9: 1
      P_10: 1
      P_11: 1
      P_12: 1
    lower: 1799.5
    upper: 1800.5   # tolerance band: 1800 +/- 0.5 MW (Between). The band variant.

objectives:
  - { variable: total_cost,     direction: minimize }
  - { variable: total_emission, direction: minimize }

known_pareto_front:
  type: empirical_reference
  source: "Built by running NSGA-II directly on the analytical cost+emission with a high budget; the resulting non-dominated set is used as the reference Pareto set for IDC and surrogate-based runs."

# Matched-budget multi-objective study (Section 7.3): same 400000 total
# surrogate-evaluation budget as the equality formulation and the baselines.
budget:
  total_nn_evaluations: 400000
  idc_per_iteration: 200
  idc_max_total_evaluations: 400000
  idc_max_iterations: 20

seeds:
  count: 1
  base: 0   # deterministic single-seed worked example (opennn::set_seed(0))
